apiVersion: v1
kind: Service
metadata:
  name: {{ include "preprocessing-service-manual.fullname" . }}
  labels:
    {{- include "preprocessing-service-manual.labels" . | nindent 4 }}
    {{- if .Values.service.gravitateHealthLabel }}
    eu.gravitate-health.fosps.preprocessing: "true"
    {{- end }}
    {{- with .Values.service.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    {{- include "preprocessing-service-manual.selectorLabels" . | nindent 4 }}
